<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);}
  .card{padding:18px 20px;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .sig{width:92px;display:flex;flex-direction:column;gap:6px}
  .bar{height:46px;border-radius:8px;border:1px solid var(--line);background:var(--panel);display:flex;align-items:center;padding:0 10px;gap:8px}
  .dot{width:10px;height:10px;border-radius:50%}
  .line-preview{flex:1;height:2px;border-radius:2px}
  .label{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;gap:4px}
  .label b{color:var(--text);font-weight:500;font-size:11px}
  .label code{font-family:var(--font-mono);font-size:10px}
</style></head><body>
<div class="card">
  <div class="sig"><div class="bar"><span class="dot" style="background:#22c55e"></span><span class="line-preview" style="background:#22c55e"></span></div><div class="label"><b>Voltage</b><code>#22C55E</code></div></div>
  <div class="sig"><div class="bar"><span class="dot" style="background:#f59e0b"></span><span class="line-preview" style="background:#f59e0b"></span></div><div class="label"><b>Current</b><code>#F59E0B</code></div></div>
  <div class="sig"><div class="bar"><span class="dot" style="background:#a855f7"></span><span class="line-preview" style="background:#a855f7"></span></div><div class="label"><b>Power</b><code>#A855F7</code></div></div>
  <div class="sig"><div class="bar"><span class="dot" style="background:#ef4444"></span><span class="line-preview" style="background:#ef4444"></span></div><div class="label"><b>Temp</b><code>#EF4444</code></div></div>
  <div class="sig"><div class="bar"><span class="dot" style="background:#06b6d4"></span><span class="line-preview" style="background:#06b6d4"></span></div><div class="label"><b>Shunt V</b><code>#06B6D4</code></div></div>
  <div class="sig"><div class="bar"><span class="dot" style="background:#f97316"></span><span class="line-preview" style="background:#f97316"></span></div><div class="label"><b>Charge</b><code>#F97316</code></div></div>
  <div class="sig"><div class="bar"><span class="dot" style="background:#3b82f6"></span><span class="line-preview" style="background:#3b82f6"></span></div><div class="label"><b>Energy</b><code>#3B82F6</code></div></div>
</div>
</body></html>
