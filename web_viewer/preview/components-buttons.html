<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:20px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  button, .btn{font-family:inherit;font-size:13px;border-radius:8px;padding:8px 12px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--text)}
  .btn.hover{border-color:#3f8cff}
  .btn.disabled{opacity:.5;cursor:not-allowed}
  .file{display:inline-flex;align-items:center;gap:6px}
  select{font-family:inherit;font-size:13px;border-radius:8px;padding:8px 12px;border:1px solid var(--line);background:var(--panel);color:var(--text)}
</style></head><body>
  <button class="btn">Load JSON</button>
  <button class="btn hover">Fit All · hover</button>
  <button class="btn disabled">Disabled</button>
  <select><option>Downsample · None</option><option>Min-Max</option><option>LTTB</option></select>
  <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)">
    <input type="checkbox" checked>Align starts
  </label>
</body></html>
