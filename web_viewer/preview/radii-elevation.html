<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:20px;display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .demo{display:flex;flex-direction:column;gap:6px;align-items:center}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
  .b{background:var(--panel);border:1px solid var(--line);width:88px;height:52px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px}
</style></head><body>
  <div class="demo"><div class="b" style="border-radius:6px">6 px</div><span class="label">--radius-sm · inputs</span></div>
  <div class="demo"><div class="b" style="border-radius:8px">8 px</div><span class="label">--radius-md · buttons, chips</span></div>
  <div class="demo"><div class="b" style="border-radius:10px">10 px</div><span class="label">--radius-lg · panels, cards</span></div>
  <div class="demo" style="margin-left:20px">
    <div class="b" style="border-radius:10px;border:1px solid rgba(63,140,255,0.16);background:linear-gradient(180deg,rgba(20,24,31,0.96),rgba(17,19,23,0.96))">timeline</div>
    <span class="label">accent-tinted border + panel gradient</span>
  </div>
</body></html>
