<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:22px 24px}
  .block{margin-bottom:18px}
  .label{font-size:11px;color:var(--muted);margin-bottom:6px;font-family:var(--font-mono);letter-spacing:.05em}
  .big{font-family:Inter;font-size:28px;font-weight:600;letter-spacing:-0.01em}
  .mono{font-family:var(--font-mono);font-size:14px;color:var(--text)}
  .mono .muted{color:var(--muted)}
  .weights{font-family:var(--font-mono);display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--text)}
  .weights span b{display:block;font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:2px;font-weight:500}
</style></head><body>
  <div class="block">
    <div class="label">INTER — UI SANS</div>
    <div class="big">ABCabc 0123 · Power Monitor</div>
  </div>
  <div class="block">
    <div class="label">JETBRAINS MONO — NUMERIC / CODE · self-hosted (woff2)</div>
    <div class="mono">12.043 V &nbsp; 0.512 A &nbsp; 6.166 W &nbsp;<span class="muted">0x55AA · SEQ=14 · CRC=OK</span></div>
  </div>
  <div class="block">
    <div class="label">MONO WEIGHT AXIS</div>
    <div class="weights">
      <span><b>100 THIN</b><span style="font-weight:100">0123 Aa</span></span>
      <span><b>300 LIGHT</b><span style="font-weight:300">0123 Aa</span></span>
      <span><b>400 REG</b><span style="font-weight:400">0123 Aa</span></span>
      <span><b>500 MED</b><span style="font-weight:500">0123 Aa</span></span>
      <span><b>600 SEMI</b><span style="font-weight:600">0123 Aa</span></span>
      <span><b>700 BOLD</b><span style="font-weight:700">0123 Aa</span></span>
      <span><b>800 XBOLD</b><span style="font-weight:800">0123 Aa</span></span>
    </div>
  </div>
</body></html>
