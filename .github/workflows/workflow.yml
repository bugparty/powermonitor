name: Build and Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Run workflow.ps1
      shell: pwsh
      run: |
        ./workflow.ps1 -Clean -Verbose

  build-device-firmware:
    name: Device Firmware (Pico SDK)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install Pico SDK & Toolchain
      shell: pwsh
      run: |
        ./scripts/setup_pico_sdk.ps1 -Force

    - name: Build Device Firmware
      shell: pwsh
      run: |
        . $HOME/.pico-sdk/env.ps1
        ./workflow.ps1 -BuildDevice
