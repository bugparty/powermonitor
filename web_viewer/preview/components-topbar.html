<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#000;color:var(--text);font-family:var(--font-sans)}
  .frame{border:1px solid var(--line);border-radius:10px;margin:10px;overflow:hidden}
  .topbar{
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;gap:16px;
    background:var(--bg-deep);
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand svg{flex:none}
  h1{margin:0;font-size:18px;font-weight:600;letter-spacing:-0.005em;white-space:nowrap}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:nowrap}
  .btn,select{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;transition:border-color 80ms ease-out}
  .btn:hover,select:hover{border-color:var(--accent)}
  .btn.hover{border-color:var(--accent)}
  .chk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);white-space:nowrap}
  .chk input[type="checkbox"]{accent-color:var(--accent);margin:0}
  .note{padding:8px 16px;background:var(--bg);color:var(--muted);font-size:11px;font-family:var(--font-mono);display:flex;justify-content:space-between;border-top:1px solid var(--line)}
  .note .tag{color:var(--subtle)}
</style></head><body>
<div class="frame">
  <header class="topbar">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 64 64" aria-hidden="true">
        <rect width="64" height="64" rx="10" fill="#181b21" stroke="#2f3643"/>
        <path d="M10,32 Q18,14 26,32 T42,32 T58,32" fill="none" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M10,40 Q20,30 30,40 T50,40 T60,38" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
      </svg>
      <h1>Power Monitor Timeline Viewer</h1>
    </div>
    <div class="controls">
      <button class="btn">Load JSON</button>
      <button class="btn hover">Fit All</button>
      <label class="chk">Downsample
        <select><option>None</option><option>Min-Max</option><option>LTTB</option></select>
      </label>
      <label class="chk"><input type="checkbox" checked>Align starts</label>
    </div>
  </header>
  <div class="note">
    <span>bg-deep · 1 px #2F3643 bottom border · 18/600 H1 · Inter</span>
    <span class="tag">sentence-case labels · no icons</span>
  </div>
</div>
</body></html>
